name: Publish frontend build

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - "new-dashboard/**"
      - "scripts/sync_frontend_dist.py"
      - ".github/workflows/publish-frontend.yml"

permissions:
  contents: write

concurrency:
  group: publish-frontend
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: new-dashboard/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        working-directory: new-dashboard
        run: npm ci

      - name: Build frontend
        working-directory: new-dashboard
        run: npm run build

      - name: Sync built site to repo root
        run: python scripts/sync_frontend_dist.py --dist new-dashboard/dist --repo-root . --clean-assets

      - name: Commit & push published build
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html assets apple-touch-icon.png favicon-32.png virusicon.jpeg virusicon.svg

          if git diff --cached --quiet; then
            echo "No frontend build changes to publish."
            exit 0
          fi

          git commit -m "Publish frontend build [skip ci]"
          git push origin HEAD:main
